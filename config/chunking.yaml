strategy: section

# ── section-based chunking ──────────────────────────────────────────────────
section:
  section_pattern: "^§\\s*(1910\\.\\S+)\\s+(.*)"
  subpart_pattern: "^Subpart\\s+([A-Z]+)—(.+)"   # em-dash required (clean_text.py enforces this)

# ── per-model chunking parameters ───────────────────────────────────────────
# Keys must match _EMBEDDING_MODELS keys in chunk_osha.py exactly.
# max_tokens_per_chunk: hard ceiling for any single chunk (tokens).
# overlap_tokens:       tokens of trailing context carried into the next chunk.
#
# Overlap sizing rationale:
#   Small windows (512)  → 10 % overlap keeps context without wasting capacity.
#   Large windows (7502+)→ flat 128 t is ample; percentage overlap wastes space.
models:
  all-minilm-l6-v2:
    max_tokens_per_chunk: 256
    overlap_tokens: 25

  qwen3-embedding:
    max_tokens_per_chunk: 10100
    overlap_tokens: 128

  all-mpnet-base-v2:
    max_tokens_per_chunk: 512
    overlap_tokens: 51

  granite-embedding-small-english-r2:
    max_tokens_per_chunk: 8192
    overlap_tokens: 128

  mini-gte:
    max_tokens_per_chunk: 512
    overlap_tokens: 51

# ── output ──────────────────────────────────────────────────────────────────
output:
  chunks_dir: "data/chunks"
  filename_template: "{section_id}_chunk_{chunk_index}.txt"
  manifest_file: "data/chunks/manifest.jsonl"